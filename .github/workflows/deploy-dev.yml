name: Deploy Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: deploy-dev-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Deploy stub (replace with real deploy)
        run: |
          echo "=== Deploy to DEV ==="
          echo "Repository: ${{ github.repository }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo ""
          echo "Replace this step with SSH, webhook, or cloud deploy."
