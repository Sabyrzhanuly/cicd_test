name: Branch Status

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: develop

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Сгенерировать BRANCH_STATUS.md
        run: node scripts/branch-status.js --markdown --file BRANCH_STATUS.md

      - name: Обновить Issue на GitHub (видно в Issues)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = fs.readFileSync("BRANCH_STATUS.md", "utf8");
            const title = "📊 develop vs main — статус веток";
            const label = "branch-status";

            let issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 1,
            });

            if (issues.data.length === 0) {
              const created = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label, "automation"],
              });
              core.info(`Created issue #${created.data.number}`);
            } else {
              const issue = issues.data[0];
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                title,
                body,
              });
              core.info(`Updated issue #${issue.number}`);
            }

      - name: Закоммитить BRANCH_STATUS.md в develop
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add BRANCH_STATUS.md
          if git diff --cached --quiet; then
            echo "BRANCH_STATUS.md без изменений"
            exit 0
          fi
          git commit -m "chore: update BRANCH_STATUS.md [skip ci]"
          git push origin HEAD:develop

      - name: Summary в Actions
        run: |
          {
            echo "## Branch status"
            echo ""
            cat BRANCH_STATUS.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Вывод в лог
        if: always()
        run: npm run branch:status
