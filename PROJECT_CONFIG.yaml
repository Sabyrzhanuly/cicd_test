# --- PROJECT CONFIG ---
# Тестовый sandbox: GitHub + Copilot Free + Telegram

project_name: "cicd-sandbox"

repo_mode: single

repositories:
  - name: "Sabyrzhanuly/cicd_test"
    role: full
    default_branch: main
    staging_branch: develop
    stack: "node"

branches:
  production: main              # компания: master
  preprod: stage                # скоро; sandbox: пока нет
  integration: develop
  # legacy aliases (sandbox)
  staging: develop
  branch_strategy: dev_per_developer
  dev_prefix: dev                      # dev/nurlan, dev/ivan
  feature_prefix: feature
  hotfix_prefix: hotfix

ci_jobs:
  - lint
  - build

github_org: "Sabyrzhanuly"
github_plan: free

# AI review: github_copilot (Free) | cursor_bugbot (позже)
ai_review:
  provider: github_copilot
  plan: free
  mode: advisory
  instructions_file: .github/copilot-instructions.md
  # Copilot code review в PR — только на Pro/Pro+; Free = IDE + инструкции репо
  pr_code_review: false

# Cursor Bugbot — отложено
cursor_bugbot_mode: disabled

telegram_group: "SBS DEV"
telegram_bot_token_secret: TELEGRAM_BOT_TOKEN
telegram_chat_id_secret: TELEGRAM_CHAT_ID

deploy_dev_trigger: push
deploy_prod_trigger: manual
deploy_prod_environment: production

owners:
  backend: "@Sabyrzhanuly"
  frontend: "@Sabyrzhanuly"
  devops: "@Sabyrzhanuly"
  tech_lead: "@Sabyrzhanuly"

cross_repo_pr_policy: "указывать номер PR в соседнем репо в описании"
